name: Generate Insights
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 1 * *'  # 1st of month, 09:00 UTC
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: brazil
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx python-dotenv
      - run: python brazil/generate_insights.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brazil/site/insights.json
          git diff --cached --quiet || git commit -m "Update insights $(date +%Y-%m-%d)"
          git push
